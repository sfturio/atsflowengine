<!DOCTYPE html>
<html class="light" lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATSFlow Engine</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-dim": "#d9dadb",
              "on-primary-container": "#fffbff",
              "primary-fixed-dim": "#c0c1ff",
              "on-background": "#191c1d",
              "primary-fixed": "#e1e0ff",
              "on-surface": "#111827",
              "on-secondary-fixed-variant": "#404178",
              "surface-container-high": "#e7e8e9",
              "outline": "#E5E7EB",
              "surface-bright": "#f8f9fa",
              "on-tertiary": "#ffffff",
              "on-tertiary-fixed-variant": "#703700",
              "surface-variant": "#F4F6FB",
              "on-tertiary-fixed": "#301400",
              "tertiary-fixed": "#ffdcc5",
              "inverse-on-surface": "#F9FAFB",
              "secondary-fixed": "#e1e0ff",
              "secondary-fixed-dim": "#c0c1ff",
              "secondary": "#575992",
              "inverse-surface": "#2e3132",
              "surface-container": "#EEF2F8",
              "inverse-primary": "#c0c1ff",
              "on-primary-fixed": "#07006c",
              "on-surface-variant": "#6B7280",
              "on-primary-fixed-variant": "#2f2ebe",
              "on-error": "#ffffff",
              "surface": "#F7F9FC",
              "outline-variant": "#E5E7EB",
              "tertiary": "#F59E0B",
              "on-secondary": "#ffffff",
              "surface-container-lowest": "#FFFFFF",
              "on-secondary-fixed": "#13144a",
              "on-tertiary-container": "#fffbff",
              "background": "#F7F9FC",
              "on-primary": "#ffffff",
              "error": "#F04438",
              "on-error-container": "#93000a",
              "tertiary-container": "#F59E0B",
              "secondary-container": "#bdbefe",
              "surface-container-low": "#F1F5FB",
              "tertiary-fixed-dim": "#ffb783",
              "on-secondary-container": "#494b83",
              "error-container": "#ffdad6",
              "primary-container": "#4F5EF7",
              "surface-tint": "#5B6CFF",
              "primary": "#5B6CFF",
              "surface-container-highest": "#E5E7EB"
            }
          }
        }
      };
    </script>
    <style>
      body { font-family: "Inter", sans-serif; }
      :root {
        --priority-high-tint: #FFF1F2;
        --priority-high-accent: #E11D48;
        --priority-medium-tint: #FFFBEB;
        --priority-medium-accent: #D97706;
        --priority-low-tint: #EFF6FF;
        --priority-low-accent: #2563EB;
        --card-radius: 17px;
        --card-radius-soft: 14px;
        --card-surface: #FFFFFF;
        --card-surface-soft: #FCFDFF;
        --card-border: rgba(229, 231, 235, 0.55);
        --card-shadow: 0 12px 32px rgba(27, 28, 29, 0.06), 0 2px 8px rgba(27, 28, 29, 0.04);
        --card-shadow-soft: 0 8px 20px rgba(27, 28, 29, 0.045), 0 1px 2px rgba(27, 28, 29, 0.03);
        --card-shadow-hover: 0 20px 42px rgba(27, 28, 29, 0.09), 0 6px 14px rgba(27, 28, 29, 0.06);
      }
      html.dark {
        color-scheme: dark;
        --card-surface: #0f172a;
        --card-surface-soft: #111b31;
        --card-border: rgba(148, 163, 184, 0.24);
        --card-shadow: 0 16px 36px rgba(2, 6, 23, 0.5), 0 2px 10px rgba(2, 6, 23, 0.35);
        --card-shadow-soft: 0 10px 24px rgba(2, 6, 23, 0.42), 0 2px 6px rgba(2, 6, 23, 0.3);
        --card-shadow-hover: 0 24px 48px rgba(2, 6, 23, 0.58), 0 8px 20px rgba(2, 6, 23, 0.44);
      }
      html.dark body {
        background:
          radial-gradient(1200px 480px at 12% -6%, rgba(91, 108, 255, 0.24), transparent 62%),
          radial-gradient(900px 380px at 88% -12%, rgba(20, 184, 166, 0.18), transparent 58%),
          #020617;
        color: #e2e8f0;
      }
      html.dark .bg-surface { background-color: #020617 !important; }
      html.dark .bg-surface-container-low { background-color: #0b1325 !important; }
      html.dark .bg-surface-container-lowest { background-color: #0f172a !important; }
      html.dark .bg-surface-container-high { background-color: #1e293b !important; }
      html.dark .bg-surface-container-highest { background-color: #334155 !important; }
      html.dark .text-on-surface { color: #e2e8f0 !important; }
      html.dark .text-on-surface-variant { color: #94a3b8 !important; }
      html.dark [class*="border-outline-variant"] { border-color: rgba(148, 163, 184, 0.24) !important; }
      html.dark .bg-white,
      html.dark .bg-white\/90 { background-color: rgba(10, 16, 34, 0.9) !important; }
      html.dark .shadow-sm { box-shadow: 0 10px 24px rgba(2, 6, 23, 0.34) !important; }
      html.dark .hover\:bg-surface-container-high:hover { background-color: #24324d !important; }
      html.dark .hover\:bg-surface-container-low:hover { background-color: #1e293b !important; }
      html.dark button[data-nav] { color: #cbd5e1 !important; }
      html.dark button[data-nav]:hover { color: #f8fafc !important; }
      html.dark button[data-nav].bg-white {
        background-color: #1e293b !important;
        color: #c7d2fe !important;
      }
      html.dark .selection\:bg-primary-fixed-dim::selection { background: rgba(91, 108, 255, 0.35); }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      .mono-label {
        font-family: 'JetBrains Mono', monospace;
        letter-spacing: 0.1em;
        font-size: 0.6875rem;
      }
      .premium-card {
        border-radius: var(--card-radius);
        border: 1px solid var(--card-border);
        box-shadow: var(--card-shadow);
        background: var(--card-surface);
      }
      .premium-card-soft {
        background: var(--card-surface-soft);
      }
      .premium-hover {
        transition: transform 200ms ease, box-shadow 200ms ease, background-color 200ms ease;
      }
      .premium-hover:hover {
        transform: translateY(-2px);
        box-shadow: var(--card-shadow-hover);
      }
    </style>
  </head>
  <body class="bg-surface text-on-surface selection:bg-primary-fixed-dim selection:text-on-primary-fixed">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/90 backdrop-blur-md shadow-sm shadow-slate-400/10 border-b border-outline-variant/50 flex justify-between items-center px-6 py-3 h-16">
      <div class="flex items-center gap-8">
        <div class="text-xl font-bold tracking-tighter">AI Career Suite</div>
        <div class="hidden md:flex items-center gap-4 text-sm font-semibold tracking-tight text-on-surface-variant">
          <span id="nav-other-text">Check our other app:</span>
          <a id="nav-other-link" href="https://ragflowengine.onrender.com/" target="_blank" rel="noopener noreferrer" class="text-primary hover:opacity-80 transition-colors">RAGFlow Engine</a>
        </div>
      </div>
      <div class="flex items-center gap-3 text-on-surface-variant">
        <button id="theme-toggle" class="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-outline-variant/60 bg-surface-container-low text-xs font-semibold hover:bg-surface-container-high transition-colors" aria-label="Alternar tema">
          <span id="theme-toggle-icon" class="material-symbols-outlined text-[18px]">dark_mode</span>
          <span id="theme-toggle-text">Light</span>
        </button>
        <span class="material-symbols-outlined">analytics</span>
      </div>
    </nav>

    <div class="flex pt-16 min-h-screen">
      <aside class="hidden lg:flex flex-col h-[calc(100vh-64px)] w-64 p-4 gap-6 bg-surface-container-low sticky top-16 border-r border-outline-variant/50">
        <div class="flex items-center gap-3 px-2">
          <div class="w-8 h-8 rounded-lg bg-primary-container flex items-center justify-center text-white">
            <span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1">analytics</span>
          </div>
          <div>
            <p class="text-lg font-bold leading-none">ATSFlow</p>
            <p class="text-[10px] text-on-surface-variant uppercase tracking-widest mt-1">Intelligent Workspace</p>
          </div>
        </div>
        <nav class="space-y-1">
          <button data-nav="analyze" class="w-full text-left flex items-center px-3 py-2.5 bg-white text-primary rounded-xl shadow-sm font-medium">
            <span class="material-symbols-outlined mr-3" style="font-variation-settings: 'FILL' 1">analytics</span><span id="side-nav-analyze">Analyze</span>
          </button>
          <button data-nav="result" class="w-full text-left flex items-center px-3 py-2.5 text-on-surface-variant hover:bg-white rounded-xl font-medium transition-all">
            <span class="material-symbols-outlined mr-3">auto_awesome</span><span id="side-nav-result">Result</span>
          </button>
          <button data-nav="history" class="w-full text-left flex items-center px-3 py-2.5 text-on-surface-variant hover:bg-white rounded-xl font-medium transition-all">
            <span class="material-symbols-outlined mr-3">history</span><span id="side-nav-history">History</span>
          </button>
          <button data-nav="about" class="w-full text-left flex items-center px-3 py-2.5 text-on-surface-variant hover:bg-white rounded-xl font-medium transition-all">
            <span class="material-symbols-outlined mr-3">info</span><span id="side-nav-about">Sobre</span>
          </button>
        </nav>
        <button id="new-analysis" class="mt-auto w-full bg-gradient-to-br from-primary to-primary-container text-white py-3 rounded-xl font-semibold shadow-md">New Analysis</button>
        <div id="sidebar-support" class="pt-1 border-t border-outline-variant"></div>
      </aside>

      <main class="flex-1 bg-surface min-h-[calc(100vh-64px)] p-6 lg:p-10 overflow-y-auto hide-scrollbar">
        <div id="app" class="max-w-6xl mx-auto"></div>
      </main>
    </div>

    <div id="modal-root"></div>

    <script src="/app.js"></script>
  </body>
</html>
